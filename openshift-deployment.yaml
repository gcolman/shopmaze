
apiVersion: v1
kind: ConfigMap
metadata:
  name: redhat-quest-config
  labels:
    app: redhat-quest-game
    component: configuration
data:
  # JavaScript configuration that will be injected into the game
  app-config.js: |
    // Red Hat Quest Game Configuration
    // This file is automatically mounted from ConfigMap
    
    window.DEPLOYMENT_CONFIG = {
      // WebSocket URL for real-time game communication
      websocketUrl: 'wss://shopmaze-websocket-route-gcolman1-dev.apps.cluster-l7rns.l7rns.sandbox1431.opentlc.com/game-control',
      
      // Leaderboard API URL for fetching game statistics (external project)
      leaderboardUrl: 'https://shopmaze-http-route-gcolman1-dev.apps.cluster-l7rns.l7rns.sandbox1431.opentlc.com/leaderboard',
      
      // Environment settings
      environment: 'production',
      
      // Game configuration
      game: {
        debug: false,
        logLevel: 'info',
        targetFPS: 60,
        // Keep external server features enabled
        enableWebSocketFeatures: true,
        enableLeaderboard: true,
        enableAdminControl: true
      },
      
      // UI configuration
      ui: {
        showDebugInfo: false,
        autoConnect: true,
        enableAnimations: true,
        enableSound: true,
        // Show connection status since we use external servers
        showConnectionStatus: true,
        showAdminControls: true,
        showLiveLeaderboard: true
      },
      
      // WebSocket configuration for external server
      websocket: {
        maxReconnectAttempts: 5,
        reconnectDelay: 3000,
        autoConnect: true
      }
    };
    
    // Set the WebSocket URL for immediate use
    window.WEBSOCKET_URL = window.DEPLOYMENT_CONFIG.websocketUrl;
    
    // Set the Leaderboard URL for immediate use
    window.LEADERBOARD_URL = window.DEPLOYMENT_CONFIG.leaderboardUrl;
    
    console.log('Red Hat Quest: Loaded game-only deployment configuration', window.DEPLOYMENT_CONFIG);
    console.log('Red Hat Quest: Using external WebSocket and app servers');

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shopmaze-websocket-config
  labels:
    app: shopmaze
    component: frontend
data:
  # Simple WebSocket URL configuration
  # Simple WebSocket URL configuration
  WEBSOCKET_URL:   "wss://shopmaze-websocket-route-gcolman1-dev.apps.rm2.thpm.p1.openshiftapps.com/game-control/game-control"
  websocketUrl:    "wss://shopmaze-websocket-route-gcolman1-dev.apps.rm2.thpm.p1.openshiftapps.com/game-control/game-control"
  LEADERBOARD_URL: "wss://shopmaze-websocket-route-gcolman1-dev.apps.rm2.thpm.p1.openshiftapps.com/game-control/leaderboard"
  leaderboardUrl:  "wss://shopmaze-websocket-route-gcolman1-dev.apps.rm2.thpm.p1.openshiftapps.com/game-control/leaderboard"


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redhat-quest-game
  labels:
    app: redhat-quest-game
    app.kubernetes.io/name: redhat-quest-game
    app.kubernetes.io/component: game-frontend
    app.kubernetes.io/part-of: redhat-quest-app
    app.kubernetes.io/version: "2.1-static"
    app.openshift.io/runtime: nginx
  annotations:
    app.openshift.io/route-disabled: 'false'
    description: "Red Hat Quest Game static frontend connecting to external services"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redhat-quest-game
  template:
    metadata:
      labels:
        app: redhat-quest-game
        deployment: redhat-quest-game
    spec:
      containers:
      - name: redhat-quest-game
        image: quay.io/uk_redhatdemo/summitconnect/redhat-quest:latest
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: DEPLOYMENT_TYPE
          value: "static"
        - name: NGINX_PORT
          value: "8080"
        - name: EXTERNAL_WEBSOCKET_URL
          value: "wss://shopmaze-websocket-route-gcolman1-dev.apps.rm2.thpm.p1.openshiftapps.com/game-control"
        - name: EXTERNAL_LEADERBOARD_URL
          value: "https://shopmaze-http-route-gcolman1-dev.apps.rm2.thpm.p1.openshiftapps.com/leaderboard"
        volumeMounts:
        - name: config-volume
          mountPath: /opt/app-root/src/config
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "75m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
      volumes:
      - name: config-volume
        configMap:
          name: redhat-quest-config
          items:
          - key: app-config.js
            path: app-config.js
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      dnsPolicy: ClusterFirst

---
apiVersion: v1
kind: Service
metadata:
  name: redhat-quest-game-service
  labels:
    app: redhat-quest-game
    service-type: http
  annotations:
    description: "HTTP service for the Red Hat Quest game web interface"
spec:
  type: ClusterIP
  selector:
    app: redhat-quest-game
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: redhat-quest-game-route
  labels:
    app: redhat-quest-game
    route-type: game
  annotations:
    description: "Main game application route"
    haproxy.router.openshift.io/timeout: 60s
    haproxy.router.openshift.io/hsts_header: "max-age=31536000;includeSubDomains;preload"
spec:
  to:
    kind: Service
    name: redhat-quest-game-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: redhat-quest-admin-route
  labels:
    app: redhat-quest-game
    route-type: admin
  annotations:
    description: "Admin panel route for game management"
    haproxy.router.openshift.io/timeout: 60s
spec:
  path: /admin.html
  to:
    kind: Service
    name: redhat-quest-game-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: redhat-quest-leaderboard-route
  labels:
    app: redhat-quest-game
    route-type: leaderboard
  annotations:
    description: "Leaderboard route for viewing game statistics"
    haproxy.router.openshift.io/timeout: 60s
spec:
  path: /leaderboard.html
  to:
    kind: Service
    name: redhat-quest-game-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

