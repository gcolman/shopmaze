---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shopmaze-config
  labels:
    app: shopmaze
    component: frontend
data:
  # JavaScript configuration that will be injected into the HTML
  app-config.js: |
    // ShopMaze Deployment Configuration
    // This file is automatically generated from ConfigMap
    
    window.DEPLOYMENT_CONFIG = {
      // WebSocket URL for container deployments
      websocketUrl: 'wss://shopmaze-websocket-route-demo-frontend.apps.cluster-75kk9.75kk9.sandbox2022.opentlc.com/game-control',
      
      // Leaderboard API URL for fetching game statistics
      leaderboardUrl: 'https://shopmaze-http-route-demo-frontend.apps.cluster-h7sqb.h7sqb.sandbox182.opentlc.com',
      
      // Environment settings
      environment: 'production',
      
      // Game configuration
      game: {
        debug: false,
        logLevel: 'info'
      },
      
      // UI configuration
      ui: {
        showDebugInfo: false,
        autoConnect: true
      }
    };
    
    // Set the WebSocket URL for immediate use
    window.WEBSOCKET_URL = window.DEPLOYMENT_CONFIG.websocketUrl;
    
    // Set the Leaderboard URL for immediate use
    window.LEADERBOARD_URL = window.DEPLOYMENT_CONFIG.leaderboardUrl;
    
    console.log('ShopMaze: Loaded deployment configuration', window.DEPLOYMENT_CONFIG);
---
